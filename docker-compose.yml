version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: battlefield-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ancient_battlefield
      POSTGRES_USER: battlefield
      POSTGRES_PASSWORD: ${DB_PASSWORD:-battlefield2024}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/performance.sql:/docker-entrypoint-initdb.d/02-performance.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battlefield -d ancient_battlefield"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - battlefield-net

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: battlefield-simulator
    entrypoint: ["/app/simulator"]
    command: [
      "-count", "800",
      "-era", "all",
      "-terrain", "all",
      "-dem-resolution", "1.0",
      "-output", "/data/data.json",
      "-seed", "2024"
    ]
    volumes:
      - simdata:/data
    networks:
      - battlefield-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: battlefield-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      simulator:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ancient_battlefield
      DB_USER: battlefield
      DB_PASSWORD: ${DB_PASSWORD:-battlefield2024}
      CONFIG_PATH: /app/config.yaml
      GIN_MODE: release
    ports:
      - "8080:8080"
      - "6060:6060"
      - "9090:9090"
    volumes:
      - simdata:/app/web/data:ro
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/statistics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - battlefield-net

  nginx:
    image: nginx:1.25-alpine
    container_name: battlefield-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    networks:
      - battlefield-net

  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: battlefield-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    networks:
      - battlefield-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: battlefield-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - battlefield-net

volumes:
  pgdata:
    driver: local
  simdata:
    driver: local
  promdata:
    driver: local
  grafanadata:
    driver: local

networks:
  battlefield-net:
    driver: bridge
