global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "battlefield-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:9090"]
        labels:
          service: "ancient-battlefield"
          env: "production"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgresql"
