logistic_regression:
  learning_rate: 0.0001
  epochs: 5000
  tolerance: 1e-7

bootstrap:
  runs: 100
  confidence_level: 0.95

background_sampling:
  default_type: target_group
  target_group_bandwidth_deg: 5.0
  num_background_points: 1000

clustering:
  default_num_regions: 8
  fcm_fuzzifier: 2.0
  fcm_max_iter: 100
  fcm_convergence_eps: 0.0001
  kmeans_max_iter: 50
  troops_scale_factor: 10000.0

high_prob_area:
  grid_lng_min: 73.0
  grid_lng_max: 135.0
  grid_lat_min: 18.0
  grid_lat_max: 54.0
  grid_lng_step_deg: 1.0
  grid_lat_step_deg: 1.0
  threshold: 0.6

terrain_profile:
  default_num_points: 50
  default_width_deg: 2.0

accessibility:
  decay_rate: 0.05
